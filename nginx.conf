events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Сжимаем текстовые ответы перед отправкой
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # HTTP — редирект на HTTPS + точка для продления сертификата
    server {
        listen 80;
        server_name YOUR_DOMAIN;

        # Certbot использует этот путь при продлении сертификата
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Всё остальное — редирект на https
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — основной сервер
    server {
        listen 443 ssl;
        server_name YOUR_DOMAIN;

        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

        # Только современные версии TLS
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # Фронтенд — статические файлы из dist/
        location / {
            root /usr/share/nginx/html;
            # SPA: все неизвестные пути отдают index.html (React Router разберётся)
            try_files $uri $uri/ /index.html;
        }

        # Долгий кэш для JS/CSS/картинок — они меняются только при пересборке
        location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Swagger UI
        location /docs {
            proxy_pass http://api:8000/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://api:8000/openapi.json;
            proxy_set_header Host $host;
        }

        # API — проксируем на FastAPI
        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout    600s;
            proxy_connect_timeout 600s;
            proxy_send_timeout    600s;
        }
    }
}
